name: CI

on:
  push:
  workflow_dispatch:
  pull_request:
    types: ['opened', 'reopened', 'synchronize']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']

    name: Node ${{ matrix.node }} build

    steps:
      - uses: actions/checkout@v6.0.3
      - run: npm ci
      - run: npm run build
      - run: npm test